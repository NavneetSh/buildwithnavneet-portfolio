name: Strengthen lower credential motion
on:
  push:
    paths:
      - '.github/workflows/strengthen-lower-credential-motion.yml'
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Strengthen AZ-500 and AZ-400 floating motion
        run: |
          python - <<'PY'
          from pathlib import Path
          p=Path('src/pages/index.astro')
          s=p.read_text()
          s=s.replace('.cert-3{bottom:20px;left:0;animation:certFloat3 5.4s ease-in-out -2.7s infinite}.cert-4{bottom:0;right:8%;animation:certFloat4 6.8s ease-in-out -4.1s infinite}', '.cert-3{bottom:20px;left:0;z-index:3;animation:certFloat3 4.2s ease-in-out infinite}.cert-4{bottom:0;right:8%;z-index:4;animation:certFloat4 4.8s ease-in-out -.8s infinite}')
          s=s.replace('@keyframes certFloat3{0%,100%{transform:translate3d(0,0,0) rotate(3deg)}50%{transform:translate3d(-5px,-15px,0) rotate(5deg)}}@keyframes certFloat4{0%,100%{transform:translate3d(0,0,0) rotate(-3deg)}50%{transform:translate3d(4px,-20px,0) rotate(-5deg)}}', '@keyframes certFloat3{0%,100%{transform:translate3d(0,10px,0) rotate(3deg)}25%{transform:translate3d(-8px,-10px,0) rotate(1deg)}50%{transform:translate3d(0,-28px,0) rotate(5deg)}75%{transform:translate3d(8px,-8px,0) rotate(2deg)}}@keyframes certFloat4{0%,100%{transform:translate3d(0,12px,0) rotate(-3deg)}25%{transform:translate3d(10px,-8px,0) rotate(-1deg)}50%{transform:translate3d(0,-32px,0) rotate(-6deg)}75%{transform:translate3d(-10px,-6px,0) rotate(-2deg)}}')
          p.write_text(s)
          PY
      - name: Commit targeted animation fix
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/pages/index.astro
          git commit -m 'Make AZ-500 and AZ-400 visibly float'
          git push origin main
