name: Fix credential floating animation

on:
  push:
    paths:
      - '.github/workflows/fix-credential-floating.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Apply independent floating animations
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('src/pages/index.astro')
          s = p.read_text()
          old = '.cert{position:absolute;width:245px;background:var(--card);border:1px solid var(--border);border-radius:22px;padding:24px;box-shadow:0 24px 60px #3038461a;display:flex;flex-direction:column;animation:certFloat 6s ease-in-out infinite}.cert-1{top:0;left:4%;transform:rotate(-4deg)}.cert-2{top:45px;right:2%;transform:rotate(4deg);animation-delay:-1.5s}.cert-3{bottom:20px;left:0;transform:rotate(3deg);animation-delay:-3s}.cert-4{bottom:0;right:8%;transform:rotate(-3deg);animation-delay:-4.5s}'
          new = '.cert{position:absolute;width:245px;background:var(--card);border:1px solid var(--border);border-radius:22px;padding:24px;box-shadow:0 24px 60px #3038461a;display:flex;flex-direction:column;will-change:transform}.cert-1{top:0;left:4%;animation:certFloat1 5.8s ease-in-out infinite}.cert-2{top:45px;right:2%;animation:certFloat2 6.4s ease-in-out -1.4s infinite}.cert-3{bottom:20px;left:0;animation:certFloat3 5.4s ease-in-out -2.7s infinite}.cert-4{bottom:0;right:8%;animation:certFloat4 6.8s ease-in-out -4.1s infinite}'
          old_keyframe = '@keyframes certFloat{50%{margin-top:-10px}}'
          new_keyframes = '@keyframes certFloat1{0%,100%{transform:translate3d(0,0,0) rotate(-4deg)}50%{transform:translate3d(0,-16px,0) rotate(-2deg)}}@keyframes certFloat2{0%,100%{transform:translate3d(0,0,0) rotate(4deg)}50%{transform:translate3d(5px,-18px,0) rotate(2deg)}}@keyframes certFloat3{0%,100%{transform:translate3d(0,0,0) rotate(3deg)}50%{transform:translate3d(-5px,-15px,0) rotate(5deg)}}@keyframes certFloat4{0%,100%{transform:translate3d(0,0,0) rotate(-3deg)}50%{transform:translate3d(4px,-20px,0) rotate(-5deg)}}'
          if old not in s or old_keyframe not in s:
              raise SystemExit('Expected CSS pattern not found; no file changed')
          s = s.replace(old, new).replace(old_keyframe, new_keyframes)
          p.write_text(s)
          PY
      - name: Commit fix
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/pages/index.astro
          git commit -m 'Fix all four credential cards floating independently'
          git push origin main
